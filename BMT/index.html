<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hawakan mo ang beat - Casino</title>
</head>

<h2>Your Points: <span id="points-balance">Loading...</span></h2>
<button type="button" onclick="addPoints(100)">Add 100 Points</button>
<br><br>
<form action="sugal.php" method="POST">
    <label>Choose Game:</label>
    <select name="game" id="game-select" onchange="updateBetTypes()">
        <option value="Lucky 7">Lucky 7</option>
        <option value="The Classic Wheel">The Classic Wheel</option>
        <option value="Color Quest">Color Quest</option>
        <option value="Prime Predictor">Prime Predictor</option>
        <option value="Dice Duel">Dice Duel</option>
    </select>

    <label>Bet Type:</label>
    <select name="type" id="type-select">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
        <option value="Low">Low (1-15)</option>
        <option value="High">High (16-30)</option>
        <option value="Lucky 7">Lucky 7 (Divisible by 7)</option>
    </select>

    <label>Bet Amount (points):</label>
    <input type="number" name="points" min="1" required>
        <br><br>
    <button type="submit" name="compute">Place Bet!</button>
</form>

<script>
    // 1. This runs immediately when the page loads to show the starting balance
    fetch('wallet.php')
        .then(response => response.text())
        .then(data => {
            document.getElementById('points-balance').innerText = data;
        })
        .catch(error => console.error('Error fetching points balance:', error));

    // 2. This function runs ONLY when you click the "Add 100 Points" button
    function addPoints(amount) {
        // Change the button text so you know it's working
        document.getElementById('points-balance').innerText = "Adding...";

        // Fetch the wallet.php file and pass the add amount in the URL
        fetch('wallet.php?add=' + amount)
            .then(response => response.text())
            .then(data => {
                // Instantly update the HTML with the new balance!
                document.getElementById('points-balance').innerText = data;
            })
            .catch(error => console.error('Error adding points:', error));
    }

    function updateBetTypes() {
        const gameSelect = document.getElementById('game-select').value;
        const typeSelect = document.getElementById('type-select');

        if (gameSelect === "Color Quest") {
            // Swap to the new 3-color options
            typeSelect.innerHTML = `
                <option value="Red">Red</option>
                <option value="Blue">Blue</option>
                <option value="Yellow">Yellow</option>
            `;

        } else if (gameSelect === "Prime Predictor") {
           // Swap to Prime Predictor options
            typeSelect.innerHTML = `
                <option value="Prime Number">Prime Number</option>
            `;

        } else if (gameSelect === "Dice Duel") {
            typeSelect.innerHTML = `
                <option value="Big">Big (8-12)</option>
                <option value="Small">Small (2-6)</option>
                <option value="Triple">Triple (3-of-a-kind)</option>
            `;
            
        } else {
            // Standard options
            typeSelect.innerHTML = `
                <option value="Odd">Odd</option>
                <option value="Even">Even</option>
                <option value="Low">Low (1-15)</option>
                <option value="High">High (16-30)</option>
                <option value="Lucky 7">Lucky 7 (Divisible by 7)</option>
            `;
        } 
    }

    
</script>
</html>
